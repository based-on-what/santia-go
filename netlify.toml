[build]
  publish = "public"
  # No build command needed — sitio estático puro (HTML + CSS + JS)

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/data/*.geojson"
  [headers.values]
    Cache-Control = "public, max-age=86400"
