[build]
  publish = "public"
  # No build command — sitio estático + Netlify Functions

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Redirects API → Functions ──────────────────────────────────────────────────

[[redirects]]
  from = "/api/metro/estacion"
  to   = "/.netlify/functions/metro-estacion"
  status = 200

[[redirects]]
  from = "/api/paradero/:id"
  to   = "/.netlify/functions/paradero?id=:id"
  status = 200

# ── Security headers ───────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/data/*.geojson"
  [headers.values]
    Cache-Control = "public, max-age=86400"
